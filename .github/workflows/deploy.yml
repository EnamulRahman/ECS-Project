name: Deploy

on:
  workflow_run:
    workflows: ["Build and Push"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag (SHA) to deploy"
        required: false
        default: "latest"

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: memos
  ECS_CLUSTER: memos-cluster
  ECS_SERVICE: memos-service

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image URL
        id: image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TAG=${{ github.event.inputs.image_tag || github.event.workflow_run.head_sha }}
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            TAG="latest"
          fi
          echo "url=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan \
            -var="image_url=${{ steps.image.outputs.url }}" \
            -input=false \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

  health-check:
    name: Post Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for ECS to stabilise
        run: sleep 60

      - name: Health check
        run: |
          echo "Checking https://tm.myegh.com/healthz..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 https://tm.myegh.com/healthz)
          echo "Response code: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status: $response"
            exit 1
          fi